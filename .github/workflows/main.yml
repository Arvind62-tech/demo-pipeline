jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build
        run: echo "Building the application"

      - name: Build Docker Image
        run: |
          docker build -t demo-pipeline-image .

      - name: Run tests
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest
          pytest
